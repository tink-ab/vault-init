name: build

on:  # yamllint disable-line rule:truthy
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: "1.20"

      - name: Build & install
        run: |
          go mod tidy
          go build -v ./...

      - name: Tests
        run: |
          go test -v ./...
          go vet ./...
